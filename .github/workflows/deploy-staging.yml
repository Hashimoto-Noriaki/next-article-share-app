name: Deploy Staging

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [master]

env:
  GCP_REGION: asia-northeast1
  SERVICE_NAME: next-article-share-app-stg
  IMAGE_NAME: asia-northeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/next-article-share-app/app

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha }} \
            --tag ${{ env.IMAGE_NAME }}:stg-latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha }}
          docker push ${{ env.IMAGE_NAME }}:stg-latest

      - name: Deploy to Cloud Run (Staging)
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --update-env-vars "NODE_ENV=production" \
            --set-secrets "APP_URL=STG_APP_URL:latest" \
            --set-secrets "NEXTAUTH_URL=STG_NEXTAUTH_URL:latest" \
            --set-secrets "NEXTAUTH_SECRET=STG_NEXTAUTH_SECRET:latest" \
            --set-secrets "DATABASE_URL=STG_DATABASE_URL:latest" \
            --set-secrets "DIRECT_URL=STG_DIRECT_URL:latest" \
            --set-secrets "JWT_SECRET=STG_JWT_SECRET:latest" \
            --set-secrets "OAUTH_GITHUB_ID=OAUTH_GITHUB_ID:latest" \
            --set-secrets "OAUTH_GITHUB_SECRET=OAUTH_GITHUB_SECRET:latest" \
            --set-secrets "OAUTH_GOOGLE_ID=OAUTH_GOOGLE_ID:latest" \
            --set-secrets "OAUTH_GOOGLE_SECRET=OAUTH_GOOGLE_SECRET:latest" \
            --set-secrets "CLOUDINARY_CLOUD_NAME=CLOUDINARY_CLOUD_NAME:latest" \
            --set-secrets "CLOUDINARY_API_KEY=CLOUDINARY_API_KEY:latest" \
            --set-secrets "CLOUDINARY_API_SECRET=CLOUDINARY_API_SECRET:latest" \
            --set-secrets "GMAIL_USER=GMAIL_USER:latest" \
            --set-secrets "GMAIL_APP_PASSWORD=GMAIL_APP_PASSWORD:latest" \
            --project ${{ secrets.GCP_PROJECT_ID }}
